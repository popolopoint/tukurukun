<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>コース作るくん v7.3.1 by Popolo App.com</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAHhxSJK-IhYiT9XBRwE1MX7DHhghBQQQk&callback=initMap" async defer></script>

    <style>
        :root {
            --blue: #007AFF; --red: #FF3B30; --green: #28a745; --gray: #8e8e93;
            --buoy-red: #ff3b30; --buoy-yellow: #ffcc00; --buoy-pink: #ff2d55;
            --buoy-orange: #ff9500; --buoy-white: #ffffff; --buoy-purple: #af52de; --buoy-skyblue: #5ac8fa;
        }
        body { display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; font-family: sans-serif; }
        .header { padding: 10px; background: white; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .title { font-weight: bold; font-size: 16px; }
        .version { font-size: 11px; color: #666; }
        .config-panel { padding: 8px 10px; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; gap: 6px; background: #fff; border-bottom: 1px solid #eee; z-index: 100; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 9px; font-weight: bold; color: #888; margin-bottom: 2px; text-align: center; }
        .input-group input, .input-group select { font-size: 14px; padding: 5px; border: 1px solid #ccc; border-radius: 6px; text-align: center; width: 100%; box-sizing: border-box; height: 32px; }
        .btn-action { background: #eee; border: 1px solid #ccc; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; height: 100%; }
        .btn-delete { background: var(--red); color: white; border: none; }
        .point-selector { display: flex; flex-wrap: wrap; gap: 4px; padding: 6px; justify-content: center; background: #fff; border-bottom: 1px solid #ddd; z-index: 100; }
        .btn-point { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #ccc; background: white; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-point.active { border: 2px solid var(--blue); background: var(--blue); color: white; }
        .btn-point.set { border-color: #555; background: #f0f0f0; }
        #map-container { flex: 1; width: 100%; position: relative; overflow: hidden; }
        #map { height: 100%; width: 100%; }
        .controls { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #fff; border-top: 1px solid #ddd; z-index: 100; flex-shrink: 0; }
        .btn-main { padding: 12px; border-radius: 8px; border: none; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-create { background: var(--blue); grid-column: span 2; }
        
        /* Modal & Markers CSS (省略なし) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 85%; max-width: 320px; }
        .modal-header { font-weight: bold; font-size: 18px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .modal-section { margin-bottom: 12px; }
        .modal-section-title { font-size: 12px; font-weight: bold; color: #888; margin-bottom: 5px; }
        .selector-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .select-item { width: 30px; height: 30px; border: 2px solid #ccc; cursor: pointer; box-sizing: border-box; position: relative; }
        .btn-modal-close { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <span class="title">コース作るくん</span>
    <span class="version">v7.3.1 by Popolo App.com</span>
</div>

<div class="config-panel">
    <div class="input-group"><label>基準点</label>
        <select id="basePoint">
            <option value="A" selected>A</option><option value="B">B</option>
            <option value="C">C</option><option value="D">D</option>
            <option value="E">E</option><option value="F">F</option>
            <option value="G">G</option><option value="H">H</option>
            <option value="I">I</option><option value="J">J</option>
        </select>
    </div>
    <div class="input-group"><label>風向(°)</label><input type="number" id="wind" value="0"></div>
    <div class="input-group"><label>AS(m)</label><input type="number" id="distAS" value="100"></div>
    <div class="input-group"><label>間隔(m)</label><input type="number" id="dist" value="500"></div>
    <div class="input-group"><label>角度(°)</label><input type="number" id="theta" value="45"></div>
</div>

<div class="point-selector" id="selector">
    <button class="btn-point" data-point="S">S</button> 
    <button class="btn-point active" data-point="A">A</button>
    <button class="btn-point" data-point="B">B</button>
    <button class="btn-point" data-point="C">C</button>
    <button class="btn-point" data-point="D">D</button>
    <button class="btn-point" data-point="E">E</button>
    <button class="btn-point" data-point="F">F</button>
    <button class="btn-point" data-point="G">G</button>
    <button class="btn-point" data-point="H">H</button>
    <button class="btn-point" data-point="I">I</button>
    <button class="btn-point" data-point="J">J</button>
    <button class="btn-point" data-point="N">N</button>
</div>

<div id="map-container">
    <div id="map"></div>
    <canvas id="draw-canvas" style="position:absolute; top:0; left:0; z-index:1000; display:none; touch-action:none;"></canvas>
</div>

<div class="controls">
    <button class="btn-main btn-create" onclick="generateCourse()">コース作成（再配置）</button>
</div>

<script>
let map, activePoint = 'A';
let markers = {}; 
let startLine = null, finishLine = null;
const pointData = {
    S: { latlng: null }, A: { latlng: null }, B: { latlng: null }, C: { latlng: null },
    D: { latlng: null }, E: { latlng: null }, F: { latlng: null }, G: { latlng: null },
    H: { latlng: null }, I: { latlng: null }, J: { latlng: null }, N: { latlng: null }
};

function initMap() {
    map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 26.3318, lng: 127.9179 }, zoom: 15,
        disableDefaultUI: true, zoomControl: true, gestureHandling: 'greedy'
    });
    map.addListener('click', (e) => setPoint(activePoint, e.latLng));
    document.querySelectorAll('.btn-point').forEach(btn => {
        btn.onclick = function() {
            document.querySelectorAll('.btn-point').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            activePoint = this.dataset.point;
        };
    });
}



function setPoint(label, latLng) {
    const pos = latLng.lat ? { lat: latLng.lat(), lng: latLng.lng() } : latLng;
    pointData[label].latlng = pos;
    const btn = document.querySelector(`.btn-point[data-point="${label}"]`);
    if(btn) btn.classList.add('set');
    if (markers[label]) {
        markers[label].setPosition(pos);
    } else {
        markers[label] = new google.maps.Marker({
            position: pos, map: map, draggable: true,
            label: { text: label, color: 'white', fontWeight: 'bold' }
        });
        markers[label].addListener('dragend', (e) => pointData[label].latlng = { lat: e.latLng.lat(), lng: e.latLng.lng() });
    }
}

// 修正版 generateCourse 関数
function generateCourse() {
    const baseLabel = document.getElementById('basePoint').value;
    const baseLatLng = pointData[baseLabel].latlng;

    if (!baseLatLng) {
        alert(`基準点 ${baseLabel} を地図上に配置してください。`);
        return;
    }

    const twd = parseFloat(document.getElementById('wind').value) || 0;
    const distAS = parseFloat(document.getElementById('distAS').value) || 100;
    const dist = parseFloat(document.getElementById('dist').value) || 500;
    const theta = parseFloat(document.getElementById('theta').value) || 45;

    const points = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];
    const baseIdx = points.indexOf(baseLabel);

    // 1. Aが基準、またはAより後の計算の場合、Sを配置 (Aの北側/南側に配置)
    if (baseIdx >= 0) { // Aが含まれるリスト
        const posA = pointData['A'].latlng;
        if (posA) {
            const brngS = (twd + 180) % 360;
            const posS = movePoint(posA, distAS, brngS);
            setPoint('S', posS);
        }
    }

    // 2. 基準点から順次「後順」の点を計算
    for (let i = baseIdx; i < points.length - 1; i++) {
        const currentLabel = points[i];
        const nextLabel = points[i + 1];
        
        // 偶数番目(A,C,E...)は右へ、奇数番目(B,D,F...)は左へ（またはその逆）
        // 角度thetaを考慮した進行方向
        const brng = (i % 2 === 0) ? (twd + 90 + theta) : (twd + 270 - theta);
        
        const currentPos = pointData[currentLabel].latlng;
        if (currentPos) {
            const nextPos = movePoint(currentPos, dist, brng);
            setPoint(nextLabel, nextPos);
        }
    }

    // 3. 基準点から「前順」の点を逆算 (例: Bが基準ならAを計算)
    for (let i = baseIdx; i > 0; i--) {
        const currentLabel = points[i];
        const prevLabel = points[i - 1];
        
        const revBrng = ((i - 1) % 2 === 0) ? (twd + 270 - theta) : (twd + 90 + theta);
        
        const currentPos = pointData[currentLabel].latlng;
        if (currentPos) {
            const prevPos = movePoint(currentPos, dist, revBrng);
            setPoint(prevLabel, prevPos);
        }
    }

    drawRaceLines();
}

// 併せて movePoint も整理しました
function movePoint(base, dist, brngDeg) {
    const R = 6378137;
    const brng = brngDeg * Math.PI / 180;
    const lat1 = base.lat * Math.PI / 180;
    const lng1 = base.lng * Math.PI / 180;
    const dR = dist / R;

    const lat2 = Math.asin(Math.sin(lat1) * Math.cos(dR) + Math.cos(lat1) * Math.sin(dR) * Math.cos(brng));
    const lng2 = lng1 + Math.atan2(Math.sin(brng) * Math.sin(dR) * Math.cos(lat1), Math.cos(dR) - Math.sin(lat1) * Math.sin(lat2));

    return { lat: lat2 * 180 / Math.PI, lng: lng2 * 180 / Math.PI };
}

function drawRaceLines() {
    if (startLine) startLine.setMap(null);
    const style = { strokeColor: '#333', strokeWeight: 2, strokeOpacity: 0.8 };
    if (pointData.S.latlng && pointData.A.latlng) {
        startLine = new google.maps.Polyline({ path: [pointData.S.latlng, pointData.A.latlng], ...style, map: map });
    }
}
</script>
</body>
</html>
